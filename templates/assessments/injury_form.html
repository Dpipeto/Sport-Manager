{% extends 'base.html' %}
{% block title %}Registrar Lesión{% endblock %}
{% block page_title %}Registrar Lesión — {{ athlete.full_name }}{% endblock %}
{% block topbar_actions %}
<a href="{{ url_for('assessments.athlete_assessments', athlete_id=athlete.id) }}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-lg-7">
<div class="card">
  <div class="card-header p-3"><i class="bi bi-bandaid me-2 text-danger"></i>Nueva Lesión — {{ athlete.full_name }}</div>
  <div class="card-body">
    <form method="POST">
      <div class="row g-3">
        <div class="col-sm-6">
          <label class="form-label">Fecha</label>
          <input type="date" name="date" class="form-control">
        </div>
        <div class="col-sm-6">
          <label class="form-label">Severidad</label>
          <select name="severity" class="form-select">
            <option value="leve">Leve</option>
            <option value="moderada">Moderada</option>
            <option value="grave">Grave</option>
          </select>
        </div>
        <div class="col-sm-6">
          <label class="form-label">Tipo de Lesión</label>
          <input type="text" name="injury_type" class="form-control" placeholder="Ej: Esguince, Fractura, Contusión..." required>
        </div>
        <div class="col-sm-6">
          <label class="form-label">Zona Corporal</label>
          <input type="text" name="body_part" class="form-control" placeholder="Ej: Tobillo derecho, Rodilla...">
        </div>
        <div class="col-12">
          <label class="form-label">Descripción</label>
          <textarea name="description" class="form-control" rows="3" placeholder="Descripción de la lesión..."></textarea>
        </div>
        <div class="col-12">
          <label class="form-label">Tratamiento</label>
          <textarea name="treatment" class="form-control" rows="2" placeholder="Plan de tratamiento..."></textarea>
        </div>
        <div class="col-sm-6">
          <label class="form-label">Fecha Recuperación</label>
          <input type="date" name="recovery_date" class="form-control">
        </div>
        <div class="col-sm-6">
          <label class="form-label">Estado</label>
          <select name="status" class="form-select">
            <option value="activa">Activa</option>
            <option value="recuperado">Recuperado</option>
          </select>
        </div>
      </div>
      <div class="d-flex justify-content-end gap-2 mt-4">
        <a href="{{ url_for('assessments.athlete_assessments', athlete_id=athlete.id) }}" class="btn btn-outline-secondary">Cancelar</a>
        <button type="submit" class="btn btn-danger px-4"><i class="bi bi-bandaid me-2"></i>Registrar Lesión</button>
      </div>
    </form>
  </div>
</div>
</div>
</div>
{% endblock %}
