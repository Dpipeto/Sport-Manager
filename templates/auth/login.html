<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión — SportManager</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600&display=swap" rel="stylesheet">
<style>
  :root { --primary: #1a56db; --primary-dark: #0e3a8a; }
  body { font-family: 'DM Sans', sans-serif; background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  h1,h2,h3 { font-family: 'Syne', sans-serif; }
  .auth-wrapper { width: 100%; max-width: 420px; padding: 20px; }
  .auth-logo { text-align: center; margin-bottom: 32px; }
  .auth-logo .logo-icon {
    width: 64px; height: 64px; background: var(--primary); border-radius: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 30px; color: white; margin-bottom: 12px; box-shadow: 0 0 40px rgba(26,86,219,.4);
  }
  .auth-logo h1 { font-weight: 800; color: white; font-size: 26px; margin: 0; }
  .auth-logo p { color: #94a3b8; font-size: 14px; margin-top: 4px; }
  .auth-card {
    background: #1e293b; border-radius: 20px; padding: 36px;
    border: 1px solid rgba(255,255,255,.06); box-shadow: 0 20px 60px rgba(0,0,0,.4);
  }
  .auth-card h2 { color: white; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .auth-card .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 28px; }
  .form-label { color: #cbd5e1; font-size: 13px; font-weight: 500; }
  .form-control {
    background: #0f172a; border: 1px solid #334155; color: white;
    border-radius: 10px; padding: 12px 14px; transition: all .2s;
  }
  .form-control:focus { background: #0f172a; border-color: var(--primary); color: white; box-shadow: 0 0 0 3px rgba(26,86,219,.2); }
  .form-control::placeholder { color: #475569; }
  .input-group .input-group-text { background: #0f172a; border-color: #334155; color: #94a3b8; border-radius: 10px 0 0 10px; }
  .input-group .form-control { border-radius: 0 10px 10px 0; }
  .btn-login {
    background: var(--primary); color: white; border: none;
    width: 100%; padding: 13px; border-radius: 10px; font-weight: 600; font-size: 15px;
    transition: all .2s; cursor: pointer;
  }
  .btn-login:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(26,86,219,.4); }
  .auth-footer { text-align: center; margin-top: 20px; color: #64748b; font-size: 14px; }
  .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
  .alert { border-radius: 10px; border: none; font-size: 14px; }
  .form-check-label { color: #94a3b8; font-size: 13px; }
  .form-check-input:checked { background-color: var(--primary); border-color: var(--primary); }
</style>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-logo">
    <div class="logo-icon"><i class="bi bi-trophy-fill"></i></div>
    <h1>SportManager</h1>
    <p>Sistema de Gestión Deportiva</p>
  </div>

  <div class="auth-card">
    <h2>Bienvenido de nuevo</h2>
    <p class="subtitle">Ingresa tus credenciales para continuar</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} mb-3">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="correo@ejemplo.com" required autocomplete="email">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>
      <div class="mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="remember" id="remember">
          <label class="form-check-label" for="remember">Recordar sesión</label>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
      </button>
    </form>
  </div>

  <div class="auth-footer">
    <a href="{{ url_for('auth.register_club') }}"
       style="display:inline-block; margin-top:4px; padding:12px 28px;
              border:2px solid var(--primary); border-radius:10px;
              color:white; background:transparent; font-weight:600;
              text-decoration:none; transition:all .2s;"
       onmouseover="this.style.background='var(--primary)'"
       onmouseout="this.style.background='transparent'">
      <i class="bi bi-buildings me-2"></i>Registrar mi Club
    </a>
  </div>
</div>
</body>
</html>
